# Raspberry Pi 5 (and Pi 4) X11 display configuration
# Fixes "Cannot run in framebuffer mode. Please specify busIDs" error when using
# startx on headless/kiosk Raspberry Pi OS setups. The kernel creates /dev/dri/card0 and
# card1 (vc4 display + v3d 3D) in random order; this tells X to use vc4 for display.
Section "OutputClass"
  Identifier "vc4"
  MatchDriver "vc4"
  Driver "modesetting"
  Option "PrimaryGPU" "true"
EndSection
