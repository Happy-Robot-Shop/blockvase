# Blockvase image defaults: expose REST for blockvase.local dashboard; keep Influx off so a missing
# InfluxDB stack does not abort the miner (see piaxe/miner.py load_last_values).
# Edit `miner` (piaxe vs qaxe+) and the matching board block for your hardware.

debug_bm1366: false
verify_solo: false
miner: piaxe

suggest_difficulty: 2048

piaxe:
  name: PiAxe
  chips: 1
  # Pi 4 / earlier: omit (defaults to bus 1). Pi 5: often 13 (auto-detected if unset).
  # i2c_bus: 13
  # Participation mode: stay online at low clock; hashrate is secondary.
  # Heat spike on power-up is usually the buck/PGOOD path, not hashing load —
  # keep clock low, abort stuck power-ups quickly, and cool longer between tries.
  asic_frequency: 50
  max_board_temp_c: 92
  asic_init_max_temp_c: 70
  asic_power_settle_sec: 3
  asic_power_retry_sec: 45
  asic_power_good_timeout_sec: 5
  asic_power_abort_temp_c: 85
  frequency_ramp_start_mhz: 43.75
  frequency_ramp_step_delay_sec: 3.0
  frequency_ramp_pause_temp_c: 78
  frequency_ramp_cooldown_temp_c: 68
  sdn_pin: 11
  pgood_pin: 13
  nrst_pin: 15
  led_pin: 19
  pwm_hz: 1000
  # HAT fan: always full speed (driver forces 100% regardless of this value).
  pwm_duty_cycle: 100
  lm75_address: 0x48
  extranonce2_interval: 1.5
  # Primary UART symlink (Pi OS); Pi 5 → ttyAMA10, Pi 4 often ttyS0. Override if your HAT differs.
  serial_port: "/dev/serial0"

bitcrane:
  name: BitCrane
  chips: 1000
  asic_frequency: 300
  extranonce2_interval: 1.5
  fan_speed: 0.25

qaxe:
  name: QAxe
  chips: 4
  fan_speed_1: 1.0
  fan_speed_2: 1.0
  asic_frequency: 485
  extranonce2_interval: 1.9
  serial_port_asic: "/dev/ttyACM0"
  serial_port_ctrl: "/dev/ttyACM1"

qaxe+:
  name: QAxe+
  chips: 4
  fan_speed_1: 1.0
  fan_speed_2: 1.0
  asic_frequency: 490
  extranonce2_interval: 1.5
  serial_port_asic: "/dev/ttyACM0"
  serial_port_ctrl: "/dev/ttyACM1"

flex4axe:
  name: Flex4Axe
  chips: 16
  fan_speed_1: 1.0
  fan_speed_2: 1.0
  asic_frequency: 480
  extranonce2_interval: 1.9
  serial_port_asic: "/dev/ttyACM0"
  serial_port_ctrl: "/dev/ttyACM1"

0xaxe:
  name: 0xAxe
  chips: 16
  fan_speed_1: 1.0
  fan_speed_2: 1.0
  asic_frequency: 480
  extranonce2_interval: 1.9
  serial_port_asic: "/dev/ttyACM0"
  serial_port_ctrl: "/dev/ttyACM1"

alerter:
  enabled: false
  type: discord-webhook
  url: file://webhook.url
  name: Piaxe1
  retrigger_time: 3600

influx:
  enabled: false
  host: localhost
  port: 8086
  token: ""
  org: piaxe
  bucket: piaxe
  timezone: UTC

smartplug:
  enabled: false
  url: http://192.168.0.166/cm?cmnd=Status%208

i2c_display:
  enabled: false

rest_api:
  enabled: true
  host: 127.0.0.1
  port: 5000
