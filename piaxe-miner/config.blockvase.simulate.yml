# Blockvase: full Stratum ↔ DATUM ↔ Knots path with CPU simulated ASIC (no UART/GPIO hardware).
# Selected when Settings → mining simulation enabled (see scripts/blockvase-miner-refresh-env.sh).

debug_bm1366: false
verify_solo: false
miner: simulate

# Lower suggestion helps CPU shares appear during integration tests on a Pi (Datum may honour it).
suggest_difficulty: 512

simulate:
  name: PiAxe-Sim
  chips: 1
  asic_frequency: 400
  extranonce2_interval: 1.5
  max_nonces_per_work: 5000000
  board_temp_c: 56
  vdomain_mv: [1200, 1200, 1200, 1200]

bitcrane:
  name: BitCrane
  chips: 1000
  asic_frequency: 300
  extranonce2_interval: 1.5
  fan_speed: 0.25

piaxe:
  name: PiAxe
  chips: 1
  asic_frequency: 485
  sdn_pin: 11
  pgood_pin: 13
  nrst_pin: 15
  led_pin: 19
  pwm_hz: 1000
  pwm_duty_cycle: 80
  lm75_address: 0x48
  extranonce2_interval: 1.5
  serial_port: "/dev/serial0"

qaxe:
  name: QAxe
  chips: 4
  fan_speed_1: 1.0
  fan_speed_2: 1.0
  asic_frequency: 485
  extranonce2_interval: 1.9
  serial_port_asic: "/dev/ttyACM0"
  serial_port_ctrl: "/dev/ttyACM1"

qaxe+:
  name: QAxe+
  chips: 4
  fan_speed_1: 1.0
  fan_speed_2: 1.0
  asic_frequency: 490
  extranonce2_interval: 1.5
  serial_port_asic: "/dev/ttyACM0"
  serial_port_ctrl: "/dev/ttyACM1"

flex4axe:
  name: Flex4Axe
  chips: 16
  fan_speed_1: 1.0
  fan_speed_2: 1.0
  asic_frequency: 480
  extranonce2_interval: 1.9
  serial_port_asic: "/dev/ttyACM0"
  serial_port_ctrl: "/dev/ttyACM1"

0xaxe:
  name: 0xAxe
  chips: 16
  fan_speed_1: 1.0
  fan_speed_2: 1.0
  asic_frequency: 480
  extranonce2_interval: 1.9
  serial_port_asic: "/dev/ttyACM0"
  serial_port_ctrl: "/dev/ttyACM1"

alerter:
  enabled: false
  type: discord-webhook
  url: file://webhook.url
  name: Piaxe1
  retrigger_time: 3600

influx:
  enabled: false
  host: localhost
  port: 8086
  token: ""
  org: piaxe
  bucket: piaxe
  timezone: UTC

smartplug:
  enabled: false
  url: http://192.168.0.166/cm?cmnd=Status%208

i2c_display:
  enabled: false

rest_api:
  enabled: true
  host: 127.0.0.1
  port: 5000
